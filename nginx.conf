server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Статические ассеты (хэш в имени) — кэшируем надолго
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SSE: отдельные location без буферизации
    location ~ ^/api/(.*/sse/)$ {
        proxy_pass https://api.parsek.io/$1;
        proxy_set_header Host api.parsek.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        gzip off;
        add_header X-Accel-Buffering no;
    }

    location ~ ^/orch/(.*/sse/)$ {
        proxy_pass https://orch.parsek.io/$1;
        proxy_set_header Host orch.parsek.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        gzip off;
        add_header X-Accel-Buffering no;
    }

    # API: проксируем на backend
    location /api/ {
        proxy_pass https://api.parsek.io/;
        proxy_set_header Host api.parsek.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Orchestrator: проксируем напрямую
    location /orch/ {
        proxy_pass https://orch.parsek.io/;
        proxy_set_header Host orch.parsek.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: все остальные пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}