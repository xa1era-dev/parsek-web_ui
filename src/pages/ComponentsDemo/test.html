<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parsek · Frame 28 — UX-улучшения</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="wireframe.jsx"></script>
  <script type="text/babel" src="improved.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "view": "improved",
      "showAnnotations": false
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const view = tweaks.view; // "split" | "original" | "improved"

      return (
        <div className="page">
          <div className="page-bar">
            <div className="brand"><span className="dot" /> Parsek · UX exploration</div>
            <div className="crumbs">
              <span>Frame 28</span>
              <span>Создание задачи</span>
              <span>До → После</span>
            </div>
            <div className="spacer" />
            <span className="pill">side-by-side</span>
          </div>

          <div className={`split ${view !== "split" ? "solo" : ""}`}>
            {(view === "split" || view === "original") && (
              <div className="pane">
                <div className="pane-head">
                  <div className="lab"><span className="badge">A</span> Оригинал · из Figma</div>
                  <div className="meta">wireframe · low-fi</div>
                </div>
                <div className="pane-body">
                  <Wireframe />
                </div>
              </div>
            )}
            {(view === "split" || view === "improved") && (
              <div className="pane">
                <div className="pane-head">
                  <div className="lab right"><span className="badge">B</span> Улучшено · интерактивный прототип</div>
                  <div className="meta">hi-fi · реальная валидация</div>
                </div>
                <div className="pane-body">
                  <ImprovedApp />
                </div>
              </div>
            )}
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Просмотр">
              <TweakRadio
                label="Режим"
                value={tweaks.view}
                onChange={v => setTweak("view", v)}
                options={[
                  { value: "split", label: "До / После" },
                  { value: "original", label: "Только оригинал" },
                  { value: "improved", label: "Только новый" },
                ]}
              />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
